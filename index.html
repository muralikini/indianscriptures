<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scripture PDFs • Page by Page</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    body { font-family: 'Inter', system_ui, sans-serif; }
    .book-container {
      max-width: 820px;
      margin: 0 auto;
      background: #1c1915;
      border: 1px solid #3a3024;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    #pdf-canvas {
      width: 100%;
      border-radius: 12px;
    }
  </style>
</head>
<body class="bg-[#0f0e0c] text-[#e8e0d0]">

  <!-- Header -->
  <div class="border-b border-[#3a3024]">
    <div class="max-w-6xl mx-auto px-6 py-5 flex items-center justify-between">
      <div class="flex items-center gap-x-3">
        <div class="w-10 h-10 bg-[#c9a26f] rounded-2xl flex items-center justify-center">
          <i class="fa-solid fa-book text-[#0f0e0c]"></i>
        </div>
        <span class="text-2xl font-semibold tracking-tight">Scriptures</span>
      </div>
      <button onclick="location.reload()" 
              class="px-5 py-2 text-sm flex items-center gap-x-2 bg-[#1c1915] hover:bg-[#29251f] border border-[#3a3024] rounded-2xl">
        <i class="fa-solid fa-home"></i>
        <span>Library</span>
      </button>
    </div>
  </div>

  <div class="max-w-6xl mx-auto px-6 pt-8">

    <!-- Library View -->
    <div id="library-view">
      <div class="max-w-2xl mx-auto text-center pt-8">
        <i class="fa-solid fa-books text-6xl text-[#3a3024]"></i>
        <h2 class="mt-6 text-3xl font-semibold">Digital Scripture Library</h2>
        <p class="text-[#a38b5f] mt-2">Select a scripture to read chapter PDFs page by page</p>
        <button onclick="loadScriptures()" 
                class="mt-8 px-8 py-3 bg-[#1c1915] hover:bg-[#29251f] border border-[#3a3024] rounded-2xl flex items-center gap-x-3 mx-auto">
          <i class="fa-solid fa-folder-open"></i>
          <span>Browse Scriptures</span>
        </button>
      </div>
    </div>

    <!-- PDF Reader -->
    <div id="pdf-reader" class="hidden">
      <div class="max-w-[820px] mx-auto">
        
        <!-- Chapter Info -->
        <div class="flex items-center justify-between mb-4 px-2">
          <div>
            <div id="scripture-name" class="text-[#a38b5f] text-sm"></div>
            <div id="chapter-name" class="text-2xl font-semibold"></div>
          </div>
          <div class="text-sm text-[#a38b5f]">
            Page <span id="current-page" class="font-medium text-white">1</span> 
            of <span id="total-pages">1</span>
          </div>
        </div>

        <!-- PDF Page Container -->
        <div class="book-container rounded-3xl p-6">
          <canvas id="pdf-canvas" class="w-full rounded-2xl shadow-inner"></canvas>
        </div>

        <!-- Navigation -->
        <div class="flex items-center justify-between mt-6">
          <button onclick="prevPage()" 
                  class="flex items-center gap-x-3 px-6 py-3.5 bg-[#1c1915] hover:bg-[#29251f] border border-[#3a3024] rounded-2xl disabled:opacity-40"
                  id="btn-prev">
            <i class="fa-solid fa-chevron-left"></i>
            <span>Previous Page</span>
          </button>

          <button onclick="nextPage()" 
                  class="flex items-center gap-x-3 px-6 py-3.5 bg-[#c9a26f] hover:bg-[#b38c55] text-[#0f0e0c] font-medium rounded-2xl disabled:opacity-40"
                  id="btn-next">
            <span>Next Page</span>
            <i class="fa-solid fa-chevron-right"></i>
          </button>
        </div>

      </div>
    </div>

  </div>

  <script>
    const GITHUB_OWNER = "muralikini";
    const GITHUB_REPO = "indianscriptures";
    const SCRIPTURES_PATH = "scriptures";

    let pdfDoc = null;
    let currentPageNum = 1;
    let totalPages = 1;
    let currentScripture = "";
    let currentChapter = "";

    // Load list of scriptures (folders)
    async function loadScriptures() {
      const container = document.getElementById("library-view");
      container.innerHTML = `<div class="text-center text-[#a38b5f] mt-8">Loading...</div>`;

      try {
        const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${SCRIPTURES_PATH}`);
        const data = await res.json();

        let html = `<div class="max-w-3xl mx-auto mt-6"><div class="grid grid-cols-1 sm:grid-cols-2 gap-3">`;

        data.forEach(item => {
          if (item.type === "dir") {
            html += `
              <div onclick="loadChapters('${item.name}')" 
                   class="flex items-center gap-x-4 px-6 py-4 bg-[#1c1915] hover:bg-[#29251f] border border-[#3a3024] rounded-2xl cursor-pointer">
                <i class="fa-solid fa-folder text-[#c9a26f]"></i>
                <span class="font-medium">${item.name}</span>
              </div>
            `;
          }
        });

        html += `</div></div>`;
        container.innerHTML = html;

      } catch (e) {
        container.innerHTML = `<p class="text-red-400 text-center">Failed to load.</p>`;
      }
    }

    // Load chapter PDFs inside a scripture
    async function loadChapters(scriptureName) {
      currentScripture = scriptureName;
      const container = document.getElementById("library-view");
      container.innerHTML = `<div class="text-center text-[#a38b5f] mt-8">Loading chapters...</div>`;

      try {
        const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${SCRIPTURES_PATH}/${scriptureName}`);
        const files = await res.json();

        let html = `<div class="max-w-3xl mx-auto"><div class="text-[#a38b5f] text-sm mb-3 px-1">Select Chapter PDF</div><div class="grid grid-cols-2 sm:grid-cols-3 gap-3">`;

        files.forEach(file => {
          if (file.name.endsWith(".pdf")) {
            const name = file.name.replace(".pdf", "").replace(/_/g, " ");
            html += `
              <div onclick="loadPDF('${scriptureName}', '${file.name}', '${name}')" 
                   class="px-5 py-4 bg-[#1c1915] hover:bg-[#29251f] border border-[#3a3024] rounded-2xl cursor-pointer text-sm transition-all">
                <i class="fa-solid fa-file-pdf mr-2 text-[#c9a26f]"></i> ${name}
              </div>
            `;
          }
        });

        html += `</div></div>`;
        container.innerHTML = html;

      } catch (e) {
        container.innerHTML = `<p class="text-red-400">Failed to load chapters.</p>`;
      }
    }

    // Load and render PDF
    async function loadPDF(scriptureName, fileName, chapterName) {
      currentScripture = scriptureName;
      currentChapter = chapterName;

      document.getElementById("library-view").classList.add("hidden");
      document.getElementById("pdf-reader").classList.remove("hidden");

      document.getElementById("scripture-name").innerText = scriptureName;
      document.getElementById("chapter-name").innerText = chapterName;

      const pdfUrl = `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/main/${SCRIPTURES_PATH}/${scriptureName}/${fileName}`;

      try {
        pdfDoc = await pdfjsLib.getDocument(pdfUrl).promise;
        totalPages = pdfDoc.numPages;
        currentPageNum = 1;

        document.getElementById("total-pages").innerText = totalPages;
        renderPage(currentPageNum);

      } catch (e) {
        alert("Failed to load PDF. Make sure the file exists in GitHub.");
        console.error(e);
      }
    }

    // Render a specific page
    async function renderPage(pageNum) {
      const page = await pdfDoc.getPage(pageNum);
      const canvas = document.getElementById("pdf-canvas");
      const ctx = canvas.getContext("2d");

      const viewport = page.getViewport({ scale: 1.5 });
      canvas.width = viewport.width;
      canvas.height = viewport.height;

      await page.render({
        canvasContext: ctx,
        viewport: viewport
      }).promise;

      document.getElementById("current-page").innerText = pageNum;
      
      // Button states
      document.getElementById("btn-prev").disabled = pageNum === 1;
      document.getElementById("btn-next").disabled = pageNum === totalPages;
    }

    function nextPage() {
      if (currentPageNum < totalPages) {
        currentPageNum++;
        renderPage(currentPageNum);
      }
    }

    function prevPage() {
      if (currentPageNum > 1) {
        currentPageNum--;
        renderPage(currentPageNum);
      }
    }

    // Start
    window.onload = function() {
      // Show library on load
    }
  </script>
</body>
</html>
