<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scriptures • Digital Library</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;family=Inter:wght@400;500;600&amp;display=swap');
    
    body { font-family: 'Inter', system_ui, sans-serif; }
    .heading-serif { font-family: 'Playfair Display', Georgia, serif; }
    
    .sanskrit-text {
      font-size: 1.05rem;
      line-height: 1.75;
      color: #e8dcc4;
    }
    
    .verse-card {
      transition: all 0.2s ease;
    }
    
    .nav-active {
      background-color: #1c1915;
      border-color: #c9a26f;
      color: #c9a26f;
    }
    
    .scripture-content {
      max-width: 780px;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>
<body class="bg-[#0f0e0c] text-[#e8e0d0]">
  
  <!-- Header -->
  <div class="border-b border-[#3a3024] bg-[#0f0e0c]">
    <div class="max-w-7xl mx-auto px-8 py-5 flex items-center justify-between">
      <div class="flex items-center gap-x-3">
        <div class="w-10 h-10 bg-[#c9a26f] rounded-2xl flex items-center justify-center">
          <i class="fa-solid fa-book text-[#0f0e0c] text-2xl"></i>
        </div>
        <div>
          <h1 class="text-2xl font-semibold tracking-tight heading-serif">Scriptures</h1>
          <p class="text-[#a38b5f] text-xs tracking-[1px]">DIGITAL LIBRARY</p>
        </div>
      </div>
      
      <div class="flex items-center gap-x-2 text-sm">
        <div class="px-4 py-1.5 bg-[#1c1915] rounded-2xl border border-[#3a3024] flex items-center gap-x-2">
          <i class="fa-solid fa-globe text-[#c9a26f]"></i>
          <span class="text-[#c9a26f]">Public Library</span>
        </div>
      </div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto flex">
    
    <!-- Sidebar: Scriptures -->
    <div class="w-72 border-r border-[#3a3024] min-h-screen p-6">
      <div class="mb-4 px-1">
        <div class="text-xs tracking-[1.5px] text-[#a38b5f] mb-2">ALL SCRIPTURES</div>
      </div>
      
      <div id="scripture-list" class="space-y-1">
        <!-- Populated dynamically via JavaScript -->
        <div class="text-[#a38b5f] text-sm px-3 py-2">Loading scriptures...</div>
      </div>
    </div>

    <!-- Main Content Area -->
    <div class="flex-1 p-8">
      
      <!-- Scripture Header -->
      <div id="scripture-header" class="hidden mb-8">
        <div class="flex items-center justify-between">
          <div>
            <h2 id="scripture-title" class="text-4xl font-semibold heading-serif tracking-tight"></h2>
            <p id="scripture-subtitle" class="text-[#a38b5f] mt-1"></p>
          </div>
          <button onclick="showScriptureList()" 
                  class="px-5 py-2 text-sm flex items-center gap-x-2 bg-[#1c1915] hover:bg-[#29251f] border border-[#3a3024] rounded-2xl transition-colors">
            <i class="fa-solid fa-arrow-left"></i>
            <span>Back to Library</span>
          </button>
        </div>
      </div>

      <!-- Chapters Grid -->
      <div id="chapters-section" class="hidden">
        <div class="text-xs tracking-[1.5px] text-[#a38b5f] mb-3 px-1">CHAPTERS</div>
        <div id="chapters-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
          <!-- Populated dynamically -->
        </div>
      </div>

      <!-- Reading Area (Digital Scripture Book Style) -->
      <div id="reading-area" class="hidden">
        <div class="scripture-content">
          <div id="reading-content" class="space-y-8">
            <!-- Content loaded here dynamically -->
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    // ==================== CONFIGURATION ====================
    const GITHUB_OWNER = "muralikini";           // ← Change if needed
    const GITHUB_REPO = "indianscriptures";      // ← Your repo name
    const SCRIPTURES_PATH = "scriptures";        // Folder containing all scriptures

    let currentScripture = "";
    let currentChapter = "";

    // ==================== FETCH SCRIPTURES ====================
    async function loadScriptures() {
      const container = document.getElementById("scripture-list");
      container.innerHTML = `<div class="text-[#a38b5f] text-sm px-3 py-2">Loading...</div>`;

      try {
        const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${SCRIPTURES_PATH}`);
        const data = await res.json();

        container.innerHTML = "";

        data.forEach(item => {
          if (item.type === "dir") {
            const div = document.createElement("div");
            div.className = `px-4 py-3 rounded-2xl cursor-pointer flex items-center gap-x-3 hover:bg-[#1c1915] transition-colors text-sm`;
            div.innerHTML = `
              <i class="fa-solid fa-book text-[#c9a26f]"></i>
              <span>${item.name}</span>
            `;
            div.onclick = () => loadChapters(item.name);
            container.appendChild(div);
          }
        });

      } catch (error) {
        container.innerHTML = `<div class="text-red-400 text-sm px-3">Failed to load scriptures. Make sure repo is public.</div>`;
      }
    }

    // ==================== LOAD CHAPTERS ====================
    async function loadChapters(scriptureName) {
      currentScripture = scriptureName;
      
      document.getElementById("scripture-header").classList.remove("hidden");
      document.getElementById("chapters-section").classList.remove("hidden");
      document.getElementById("reading-area").classList.add("hidden");

      document.getElementById("scripture-title").innerText = scriptureName;
      document.getElementById("scripture-subtitle").innerText = "Select a chapter to begin reading";

      const grid = document.getElementById("chapters-grid");
      grid.innerHTML = `<div class="col-span-full text-[#a38b5f]">Loading chapters...</div>`;

      try {
        const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${SCRIPTURES_PATH}/${scriptureName}`);
        const data = await res.json();

        grid.innerHTML = "";

        data.forEach(file => {
          if (file.name.endsWith(".md")) {
            const card = document.createElement("div");
            card.className = `bg-[#1c1915] border border-[#3a3024] hover:border-[#c9a26f] rounded-2xl p-4 cursor-pointer transition-all`;
            
            const chapterName = file.name.replace(".md", "").replace(/_/g, " ");
            
            card.innerHTML = `
              <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-[#29251f] rounded-2xl flex items-center justify-center text-[#c9a26f]">
                  <i class="fa-solid fa-scroll"></i>
                </div>
                <div>
                  <div class="font-medium">${chapterName}</div>
                </div>
              </div>
            `;
            
            card.onclick = () => loadChapterContent(scriptureName, file.name, chapterName);
            grid.appendChild(card);
          }
        });

      } catch (error) {
        grid.innerHTML = `<div class="text-red-400">Failed to load chapters.</div>`;
      }
    }

    // ==================== LOAD CHAPTER CONTENT (Beautiful Book Style) ====================
    async function loadChapterContent(scriptureName, fileName, displayName) {
      currentChapter = displayName;
      
      document.getElementById("chapters-section").classList.add("hidden");
      document.getElementById("reading-area").classList.remove("hidden");

      const contentDiv = document.getElementById("reading-content");
      contentDiv.innerHTML = `
        <div class="text-center py-12">
          <i class="fa-solid fa-spinner fa-spin text-2xl text-[#c9a26f]"></i>
          <p class="mt-4 text-[#a38b5f]">Loading sacred text...</p>
        </div>
      `;

      try {
        const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${SCRIPTURES_PATH}/${scriptureName}/${fileName}`);
        const data = await res.json();
        
        // Decode base64 content
        const markdown = atob(data.content);
        
        // Simple beautiful rendering
        contentDiv.innerHTML = `
          <div class="mb-8">
            <div class="flex items-center justify-between">
              <div>
                <h3 class="text-3xl font-semibold heading-serif">${displayName}</h3>
                <p class="text-[#a38b5f]">${scriptureName}</p>
              </div>
              <button onclick="loadChapters('${scriptureName}')" 
                      class="px-4 py-2 text-sm bg-[#1c1915] border border-[#3a3024] rounded-2xl flex items-center gap-x-2 hover:bg-[#29251f]">
                <i class="fa-solid fa-list"></i>
                <span>Chapters</span>
              </button>
            </div>
          </div>
          
          <div class="prose prose-invert max-w-none">
            ${renderMarkdownBeautifully(markdown)}
          </div>
        `;

      } catch (error) {
        contentDiv.innerHTML = `<div class="text-red-400">Failed to load chapter content.</div>`;
      }
    }

    // Simple but beautiful Markdown renderer (for scripture style)
    function renderMarkdownBeautifully(markdown) {
      let html = markdown
        .replace(/^### (.*$)/gm, '<h3 class="text-xl font-semibold mt-8 mb-3 text-[#c9a26f]">$1</h3>')
        .replace(/^## (.*$)/gm, '<h2 class="text-2xl font-semibold mt-10 mb-4 heading-serif">$1</h2>')
        .replace(/^# (.*$)/gm, '<h1 class="text-3xl font-semibold mt-2 mb-6 heading-serif">$1</h1>')
        .replace(/\*\*(.*?)\*\*/g, '<strong class="text-[#e8dcc4]">$1</strong>')
        .replace(/\n\n/g, '</p><p class="mb-4 text-[#d4c9b0] leading-relaxed">')
        .replace(/\n/g, '<br>');

      // Wrap in paragraphs
      html = `<p class="mb-4 text-[#d4c9b0] leading-relaxed">${html}</p>`;
      
      return html;
    }

    function showScriptureList() {
      document.getElementById("scripture-header").classList.add("hidden");
      document.getElementById("chapters-section").classList.add("hidden");
      document.getElementById("reading-area").classList.add("hidden");
    }

    // ==================== INITIALIZE ====================
    window.onload = function() {
      loadScriptures();
    }
  </script>
</body>
</html>
