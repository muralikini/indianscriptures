<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Scripture Reader</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;family=Inter:wght@400;500&amp;display=swap');
    
    body {
      font-family: 'Inter', system_ui, sans-serif;
    }
    .heading-serif {
      font-family: 'Playfair Display', Georgia, serif;
    }
    
    .book-page {
      background-color: #1c1915;
      border: 1px solid #3a3024;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .page-transition {
      animation: pageFlip 0.4s ease forwards;
    }

    @keyframes pageFlip {
      from {
        opacity: 0.6;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .sanskrit {
      font-size: 1.1rem;
      line-height: 1.75;
      color: #e8dcc4;
    }

    .reading-container {
      max-width: 720px;
      margin: 0 auto;
    }
  </style>
</head>
<body class="bg-[#0f0e0c] text-[#e8e0d0]">

  <!-- Header -->
  <div class="border-b border-[#3a3024]">
    <div class="max-w-5xl mx-auto px-6 py-5 flex items-center justify-between">
      <div class="flex items-center gap-x-3">
        <div class="w-10 h-10 bg-[#c9a26f] rounded-2xl flex items-center justify-center">
          <i class="fa-solid fa-book text-[#0f0e0c] text-xl"></i>
        </div>
        <div>
          <span class="text-xl font-semibold heading-serif tracking-tight">Scriptures</span>
        </div>
      </div>
      <button onclick="location.reload()" 
              class="px-5 py-2 text-sm flex items-center gap-x-2 bg-[#1c1915] hover:bg-[#29251f] border border-[#3a3024] rounded-2xl transition-colors">
        <i class="fa-solid fa-home"></i>
        <span>Library</span>
      </button>
    </div>
  </div>

  <div class="max-w-5xl mx-auto px-6 pt-8 pb-12">
    
    <!-- Reader Header -->
    <div id="reader-header" class="hidden mb-6 text-center">
      <div class="text-[#a38b5f] text-sm tracking-[2px]" id="scripture-name"></div>
      <div class="text-3xl font-semibold heading-serif mt-1" id="chapter-name"></div>
    </div>

    <!-- Book Page Container -->
    <div id="verse-reader" class="hidden">
      <div class="reading-container">
        
        <!-- Page Info -->
        <div class="flex justify-between items-center mb-3 px-2">
          <div class="text-sm text-[#a38b5f]">
            Page <span id="current-page" class="font-medium text-white">1</span> of <span id="total-pages">28</span>
          </div>
          <div class="text-xs px-3 py-1 bg-[#1c1915] border border-[#3a3024] rounded-full" id="verse-number">
            Verse
          </div>
        </div>

        <!-- Main Book Page -->
        <div id="book-page" 
             class="book-page rounded-3xl p-9 min-h-[480px] max-h-[520px] flex flex-col">
          
          <!-- Sanskrit -->
          <div class="mb-6">
            <div class="text-[#a38b5f] text-xs tracking-wider mb-2">SANSKRIT</div>
            <div id="sanskrit-text" class="sanskrit leading-relaxed"></div>
          </div>

          <!-- Translation -->
          <div class="mb-6 flex-1">
            <div class="text-[#a38b5f] text-xs tracking-wider mb-2">TRANSLATION</div>
            <div id="translation-text" class="text-[#d4c9b0] leading-relaxed text-[15.2px]"></div>
          </div>

          <!-- Explanation (Fixed height + scrollable) -->
          <div class="mt-auto">
            <div class="flex items-center justify-between mb-2">
              <div class="text-[#a38b5f] text-xs tracking-wider">EXPLANATION</div>
              <button onclick="toggleExplanation()" 
                      class="text-xs text-[#c9a26f] hover:underline">Toggle</button>
            </div>
            <div id="explanation-box" 
                 class="hidden text-[#b8a98a] text-[14.5px] leading-relaxed border-l-2 border-[#3a3024] pl-4 max-h-[110px] overflow-y-auto pr-2">
              <div id="explanation-text"></div>
            </div>
          </div>

        </div>

        <!-- Navigation -->
        <div class="flex items-center justify-between mt-6">
          <button onclick="previousPage()" 
                  class="flex items-center gap-x-3 px-7 py-3.5 bg-[#1c1915] hover:bg-[#29251f] border border-[#3a3024] rounded-2xl transition-all disabled:opacity-40"
                  id="btn-prev">
            <i class="fa-solid fa-chevron-left"></i>
            <span>Previous Page</span>
          </button>

          <button onclick="nextPage()" 
                  class="flex items-center gap-x-3 px-7 py-3.5 bg-[#c9a26f] hover:bg-[#b38c55] text-[#0f0e0c] font-medium rounded-2xl transition-all disabled:opacity-40"
                  id="btn-next">
            <span>Next Page</span>
            <i class="fa-solid fa-chevron-right"></i>
          </button>
        </div>

      </div>
    </div>

    <!-- Library / Initial State -->
    <div id="library-view">
      <div class="max-w-2xl mx-auto text-center pt-10">
        <i class="fa-solid fa-book text-6xl text-[#3a3024]"></i>
        <h2 class="mt-6 text-3xl font-semibold heading-serif">Digital Scripture Library</h2>
        <p class="text-[#a38b5f] mt-3">Choose a scripture to begin reading page by page.</p>
        
        <button onclick="loadScriptures()" 
                class="mt-8 px-8 py-3.5 bg-[#1c1915] hover:bg-[#29251f] border border-[#3a3024] rounded-2xl flex items-center gap-x-3 mx-auto transition-colors">
          <i class="fa-solid fa-folder-open"></i>
          <span>Browse Scriptures</span>
        </button>
      </div>
    </div>

  </div>

  <script>
    // ================== CONFIG ==================
    const GITHUB_OWNER = "muralikini";
    const GITHUB_REPO = "indianscriptures";
    const SCRIPTURES_PATH = "scriptures";

    let verses = [];
    let currentIndex = 0;
    let currentScripture = "";
    let currentChapter = "";

    // ================== LOAD SCRIPTURES ==================
    async function loadScriptures() {
      const container = document.getElementById("library-view");
      container.innerHTML = `<div class="text-center text-[#a38b5f] mt-8">Loading scriptures...</div>`;

      try {
        const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${SCRIPTURES_PATH}`);
        const data = await res.json();

        let html = `<div class="max-w-3xl mx-auto"><div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mt-6">`;

        data.forEach(item => {
          if (item.type === "dir") {
            html += `
              <div onclick="loadChapters('${item.name}')" 
                   class="flex items-center gap-x-4 px-6 py-4 bg-[#1c1915] hover:bg-[#29251f] border border-[#3a3024] rounded-2xl cursor-pointer transition-all">
                <i class="fa-solid fa-book text-[#c9a26f]"></i>
                <span class="font-medium">${item.name}</span>
              </div>
            `;
          }
        });

        html += `</div></div>`;
        container.innerHTML = html;

      } catch (e) {
        container.innerHTML = `<p class="text-red-400 text-center">Failed to load scriptures.</p>`;
      }
    }

    // ================== LOAD CHAPTERS ==================
    async function loadChapters(scriptureName) {
      currentScripture = scriptureName;
      const container = document.getElementById("library-view");
      container.innerHTML = `<div class="text-center text-[#a38b5f] mt-8">Loading chapters...</div>`;

      try {
        const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${SCRIPTURES_PATH}/${scriptureName}`);
        const files = await res.json();

        let html = `<div class="max-w-3xl mx-auto"><div class="text-[#a38b5f] text-sm mb-3 px-1">Select Chapter</div><div class="grid grid-cols-2 sm:grid-cols-3 gap-3">`;

        files.forEach(file => {
          if (file.name.endsWith(".md")) {
            const name = file.name.replace(".md", "").replace(/_/g, " ");
            html += `
              <div onclick="loadChapterContent('${scriptureName}', '${file.name}', '${name}')" 
                   class="px-5 py-4 bg-[#1c1915] hover:bg-[#29251f] border border-[#3a3024] rounded-2xl cursor-pointer text-sm transition-all">
                ${name}
              </div>
            `;
          }
        });

        html += `</div></div>`;
        container.innerHTML = html;

      } catch (e) {
        container.innerHTML = `<p class="text-red-400">Failed to load chapters.</p>`;
      }
    }

    // ================== LOAD CHAPTER CONTENT ==================
    async function loadChapterContent(scriptureName, fileName, chapterName) {
      currentScripture = scriptureName;
      currentChapter = chapterName;

      document.getElementById("library-view").classList.add("hidden");
      document.getElementById("verse-reader").classList.remove("hidden");
      document.getElementById("reader-header").classList.remove("hidden");

      document.getElementById("scripture-name").innerText = scriptureName;
      document.getElementById("chapter-name").innerText = chapterName;

      try {
        const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${SCRIPTURES_PATH}/${scriptureName}/${fileName}`);
        const data = await res.json();
        const markdown = atob(data.content);

        verses = parseVerses(markdown);
        currentIndex = 0;

        renderPage();

      } catch (e) {
        alert("Failed to load chapter");
      }
    }

    // Simple verse parser
    function parseVerses(markdown) {
      // Split by common verse patterns
      const parts = markdown.split(/##\s*Verse|###\s*Verse|\n\s*\d+\.\d+\s*/i);
      let result = [];

      for (let part of parts) {
        if (part.trim().length < 20) continue;

        result.push({
          sanskrit: extractSection(part, "sanskrit"),
          translation: extractSection(part, "translation"),
          explanation: extractSection(part, "explanation")
        });
      }

      return result.length > 0 ? result : [{
        sanskrit: markdown.substring(0, 600),
        translation: "Please check the source file formatting.",
        explanation: ""
      }];
    }

    function extractSection(text, type) {
      const lower = text.toLowerCase();
      let start = lower.indexOf(type);
      if (start === -1) return "";

      let content = text.substring(start + type.length + 1, start + 600);
      return content.split("\n")[0].trim();
    }

    // ================== RENDER CURRENT PAGE ==================
    function renderPage() {
      const verse = verses[currentIndex];
      const pageContainer = document.getElementById("book-page");

      // Add transition effect
      pageContainer.classList.remove("page-transition");
      void pageContainer.offsetWidth; // trigger reflow
      pageContainer.classList.add("page-transition");

      document.getElementById("current-page").innerText = currentIndex + 1;
      document.getElementById("total-pages").innerText = verses.length;
      document.getElementById("verse-number").innerText = `Verse ${currentIndex + 1}`;

      document.getElementById("sanskrit-text").innerHTML = verse.sanskrit || "—";
      document.getElementById("translation-text").innerText = verse.translation || "—";
      document.getElementById("explanation-text").innerText = verse.explanation || "No explanation available.";

      // Reset explanation visibility
      document.getElementById("explanation-box").classList.add("hidden");

      // Button states
      document.getElementById("btn-prev").disabled = currentIndex === 0;
      document.getElementById("btn-next").disabled = currentIndex === verses.length - 1;
    }

    function nextPage() {
      if (currentIndex < verses.length - 1) {
        currentIndex++;
        renderPage();
      }
    }

    function previousPage() {
      if (currentIndex > 0) {
        currentIndex--;
        renderPage();
      }
    }

    function toggleExplanation() {
      const box = document.getElementById("explanation-box");
      box.classList.toggle("hidden");
    }

    // Start
    window.onload = function() {
      // Show library by default
    }
  </script>
</body>
</html>
